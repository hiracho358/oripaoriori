<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Joke Generator</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    padding: 40px;
    max-width: 600px;
    width: 100%;
}

h1 {
    text-align: center;
    color: #667eea;
    margin-bottom: 10px;
    font-size: 2.5em;
}

.subtitle {
    text-align: center;
    color: #999;
    margin-bottom: 30px;
    font-size: 14px;
}

.joke-box {
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    border-radius: 15px;
    padding: 30px;
    margin-bottom: 25px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.joke-text {
    color: #333;
    font-size: 18px;
    line-height: 1.6;
    text-align: center;
    font-weight: 500;
}

.punchline {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 2px solid rgba(102, 126, 234, 0.2);
    color: #667eea;
    font-weight: bold;
    font-size: 17px;
}

.loading {
    display: none;
    text-align: center;
    color: #667eea;
    font-weight: bold;
}

.spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #667eea;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto 10px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.button-group {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

button {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 14px 30px;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
}

button:active {
    transform: translateY(0);
}

button:disabled {
    background: #ccc;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
}

.copy-btn {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
}

.copy-btn:hover {
    box-shadow: 0 8px 20px rgba(245, 87, 108, 0.6);
}

.category-select {
    width: 100%;
    padding: 12px;
    margin-bottom: 25px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    background: white;
    transition: border-color 0.3s ease;
}

.category-select:focus {
    outline: none;
    border-color: #667eea;
}

.stats {
    background: #f5f7fa;
    border-radius: 10px;
    padding: 15px;
    margin-top: 20px;
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    gap: 15px;
}

.stat-item {
    text-align: center;
}

.stat-label {
    color: #999;
    font-size: 12px;
    margin-bottom: 5px;
}

.stat-value {
    color: #667eea;
    font-size: 24px;
    font-weight: bold;
}

.error {
    background: #ffe0e0;
    color: #d32f2f;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    display: none;
}

.favorite-jokes {
    background: #f5f7fa;
    border-radius: 10px;
    padding: 15px;
    margin-top: 20px;
    max-height: 200px;
    overflow-y: auto;
}

.favorite-jokes-title {
    color: #667eea;
    font-weight: bold;
    margin-bottom: 10px;
    font-size: 14px;
}

.favorite-item {
    background: white;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    font-size: 13px;
    color: #333;
    border-left: 4px solid #667eea;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.remove-btn {
    background: #f5576c;
    color: white;
    border: none;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
}

.remove-btn:hover {
    background: #d32f2f;
}

@media (max-width: 600px) {
    .container {
        padding: 25px;
    }
    
    h1 {
        font-size: 1.8em;
    }
    
    .joke-text {
        font-size: 16px;
    }
    
    button {
        padding: 12px 20px;
        font-size: 14px;
    }
    
    .button-group {
        gap: 10px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>😂 Joke Generator</h1>
    <p class="subtitle">Get a random laugh every time</p>

    <div class="error" id="error"></div>

    <select class="category-select" id="categorySelect">
        <option value="any">Any Category</option>
        <option value="general">General</option>
        <option value="programming">Programming</option>
        <option value="knock-knock">Knock Knock</option>
    </select>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Getting you a laugh...</p>
    </div>

    <div class="joke-box" id="jokeBox">
        <div class="joke-text">Click the button to get a joke!</div>
    </div>

    <div class="button-group">
        <button onclick="getJoke()" id="getJokeBtn">Get Joke</button>
        <button class="copy-btn" onclick="copyJoke()" id="copyBtn">📋 Copy</button>
        <button class="copy-btn" onclick="toggleFavorite()" id="favoriteBtn">❤️ Favorite</button>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-label">Jokes Loaded</div>
            <div class="stat-value" id="jokeCount">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Favorites</div>
            <div class="stat-value" id="favoriteCount">0</div>
        </div>
    </div>

    <div class="favorite-jokes" id="favoriteJokes" style="display: none;">
        <div class="favorite-jokes-title">⭐ Your Favorite Jokes</div>
        <div id="favoriteList"></div>
    </div>

</div>

<script>

const API_URL = "https://official-joke-api.appspot.com";

let currentJoke = null;
let jokeCount = 0;
let favorites = loadFavorites();

const jokeBox = document.getElementById("jokeBox");
const loading = document.getElementById("loading");
const error = document.getElementById("error");
const getJokeBtn = document.getElementById("getJokeBtn");
const categorySelect = document.getElementById("categorySelect");
const favoriteBtn = document.getElementById("favoriteBtn");
const jokeCountDisplay = document.getElementById("jokeCount");
const favoriteCountDisplay = document.getElementById("favoriteCount");
const favoriteJokesContainer = document.getElementById("favoriteJokes");
const favoriteList = document.getElementById("favoriteList");

updateStats();

async function getJoke() {
    hideError();
    showLoading();
    getJokeBtn.disabled = true;
    
    try {
        const category = categorySelect.value;
        let url;
        
        if (category === "any") {
            url = `${API_URL}/random_joke`;
        } else {
            url = `${API_URL}/jokes/${category}/random`;
        }
        
        const response = await fetch(url);
        
        if (!response.ok) {
            throw new Error("Failed to fetch joke");
        }
        
        const data = await response.json();
        
        // Handle both single joke and array response
        currentJoke = Array.isArray(data) ? data[0] : data;
        
        jokeCount++;
        displayJoke(currentJoke);
        updateStats();
        
    } catch (err) {
        showError("Oops! Could not load a joke. Please try again.");
        console.error("Error:", err);
    } finally {
        hideLoading();
        getJokeBtn.disabled = false;
    }
}

function displayJoke(joke) {
    let jokeHTML = `<div class="joke-text">${joke.setup}`;
    
    if (joke.delivery) {
        jokeHTML += `<div class="punchline">${joke.delivery}</div>`;
    } else if (joke.punchline) {
        jokeHTML += `<div class="punchline">${joke.punchline}</div>`;
    }
    
    jokeHTML += `</div>`;
    jokeBox.innerHTML = jokeHTML;
    
    // Update favorite button appearance
    updateFavoriteButton();
}

function copyJoke() {
    if (!currentJoke) {
        showError("No joke to copy!");
        return;
    }
    
    let jokeText = currentJoke.setup;
    if (currentJoke.delivery) {
        jokeText += "\n" + currentJoke.delivery;
    } else if (currentJoke.punchline) {
        jokeText += "\n" + currentJoke.punchline;
    }
    
    navigator.clipboard.writeText(jokeText).then(() => {
        const btn = document.getElementById("copyBtn");
        const originalText = btn.innerText;
        btn.innerText = "✅ Copied!";
        setTimeout(() => {
            btn.innerText = originalText;
        }, 2000);
    }).catch(() => {
        showError("Failed to copy joke!");
    });
}

function toggleFavorite() {
    if (!currentJoke) {
        showError("No joke to favorite!");
        return;
    }
    
    const jokeStr = JSON.stringify(currentJoke);
    const index = favorites.findIndex(j => JSON.stringify(j) === jokeStr);
    
    if (index > -1) {
        favorites.splice(index, 1);
    } else {
        favorites.push(currentJoke);
    }
    
    saveFavorites();
    updateStats();
    updateFavoriteButton();
    displayFavorites();
}

function updateFavoriteButton() {
    if (!currentJoke) return;
    
    const jokeStr = JSON.stringify(currentJoke);
    const isFavorited = favorites.some(j => JSON.stringify(j) === jokeStr);
    
    favoriteBtn.style.background = isFavorited 
        ? "linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%)"
        : "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)";
}

function displayFavorites() {
    if (favorites.length === 0) {
        favoriteJokesContainer.style.display = "none";
        return;
    }
    
    favoriteJokesContainer.style.display = "block";
    favoriteList.innerHTML = "";
    
    favorites.forEach((joke, index) => {
        let jokeText = joke.setup;
        if (joke.delivery) {
            jokeText += " " + joke.delivery;
        } else if (joke.punchline) {
            jokeText += " " + joke.punchline;
        }
        
        const item = document.createElement("div");
        item.className = "favorite-item";
        item.innerHTML = `
            <span>${jokeText.substring(0, 50)}...</span>
            <button class="remove-btn" onclick="removeFavorite(${index})">Remove</button>
        `;
        favoriteList.appendChild(item);
    });
}

function removeFavorite(index) {
    favorites.splice(index, 1);
    saveFavorites();
    updateStats();
    displayFavorites();
    updateFavoriteButton();
}

function updateStats() {
    jokeCountDisplay.innerText = jokeCount;
    favoriteCountDisplay.innerText = favorites.length;
    displayFavorites();
}

function saveFavorites() {
    localStorage.setItem("jokeGenFavorites", JSON.stringify(favorites));
}

function loadFavorites() {
    const saved = localStorage.getItem("jokeGenFavorites");
    return saved ? JSON.parse(saved) : [];
}

function showLoading() {
    loading.style.display = "block";
    jokeBox.style.display = "none";
}

function hideLoading() {
    loading.style.display = "none";
    jokeBox.style.display = "flex";
}

function showError(message) {
    error.innerText = message;
    error.style.display = "block";
    setTimeout(() => {
        error.style.display = "none";
    }, 5000);
}

function hideError() {
    error.style.display = "none";
}

// Get initial joke on page load
window.addEventListener("load", () => {
    getJoke();
});

</script>

</body>
</html>
